<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Circuit Breaker — resilience stand</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-body-tertiary">
  <div class="container py-2">
    <div class="d-flex align-items-center justify-content-between mb-2">
      <h1 class="h6 mb-0">ASP.NET Polly Lab</h1>
      <span id="conn" class="badge text-bg-secondary">connecting…</span>
    </div>

    <!-- Circuit breaker state indicator -->
    <div id="circuitBanner" class="card text-bg-success mb-2">
      <div class="card-body text-center py-2">
        <div class="small text-uppercase opacity-75">Circuit breaker</div>
        <div id="circuitState" class="display-6 fw-bold lh-1">CLOSED</div>
        <div id="circuitDetail" class="small opacity-75">normal — requests reach the dependency</div>
      </div>
    </div>

    <!-- Counters -->
    <div class="row g-2 mb-2">
      <div class="col-3">
        <div class="card text-bg-success"><div class="card-body p-1 text-center">
          <div id="okCount" class="fs-4 fw-bold lh-1">0</div>
          <div class="text-uppercase opacity-75" style="font-size:.6rem">Success</div>
        </div></div>
      </div>
      <div class="col-3">
        <div class="card text-bg-danger"><div class="card-body p-1 text-center">
          <div id="failCount" class="fs-4 fw-bold lh-1">0</div>
          <div class="text-uppercase opacity-75" style="font-size:.6rem">Failures</div>
        </div></div>
      </div>
      <div class="col-3">
        <div class="card text-bg-warning"><div class="card-body p-1 text-center">
          <div id="retryCount" class="fs-4 fw-bold lh-1">0</div>
          <div class="text-uppercase opacity-75" style="font-size:.6rem">Retries</div>
        </div></div>
      </div>
      <div class="col-3">
        <div class="card"><div class="card-body p-1 text-center">
          <div id="lastLatency" class="fs-4 fw-bold lh-1">—</div>
          <div class="text-uppercase text-muted" style="font-size:.6rem">Latency</div>
        </div></div>
      </div>
    </div>

    <div class="row g-2">
      <!-- Levers -->
      <div class="col-md-4">
        <div class="card"><div class="card-body">
          <h2 class="h6 card-title">Dependency levers</h2>

          <div class="form-check form-switch mb-2">
            <input class="form-check-input" type="checkbox" id="up" checked>
            <label class="form-check-label small" for="up">Dependency alive</label>
          </div>

          <label class="form-label small mb-1">Failure rate: <span id="failLabel">0%</span></label>
          <input type="range" class="form-range" id="failRate" min="0" max="100" value="0">

          <label class="form-label small mb-1 mt-1">Latency: <span id="delayLabel">50</span> ms</label>
          <input type="range" class="form-range" id="delay" min="0" max="3000" step="50" value="50">

          <hr class="my-2">
          <button id="callOnce" class="btn btn-sm btn-primary w-100">Call once</button>
        </div></div>

        <div class="card mt-2"><div class="card-body">
          <h2 class="h6 card-title">Load generator</h2>

          <div class="form-check form-switch mb-2">
            <input class="form-check-input" type="checkbox" id="loadRunning">
            <label class="form-check-label small" for="loadRunning">Generate load</label>
          </div>

          <label class="form-label small mb-1">Rate: <span id="rpsLabel">5</span> req/s</label>
          <input type="range" class="form-range" id="rps" min="1" max="100" value="5">
        </div></div>
      </div>

      <!-- Circuit timeline + event feed -->
      <div class="col-md-8">
        <div class="card mb-2"><div class="card-body p-2">
          <h2 class="h6 card-title">Circuit breaker timeline</h2>
          <div id="timeline" class="font-monospace small" style="max-height:120px;overflow:auto"></div>
        </div></div>

        <div class="card"><div class="card-body p-2">
          <h2 class="h6 card-title">Recent calls</h2>
          <div id="feed" class="font-monospace small" style="max-height:300px;overflow:auto"></div>
        </div></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.7/dist/browser/signalr.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
